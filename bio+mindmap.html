<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THunderstudy — Secure Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK THEME ── */
    :root, [data-theme="dark"] {
      --bg: #1a0f2e;
      --surface: #231542;
      --surface2: #2d1a55;
      --border: #3d2570;
      --accent: #f3e8ff;
      --accent2: #c084fc;
      --accent3: #a855f7;
      --text: #f3e8ff;
      --muted: #9d7ec4;
      --danger: #f87171;
      --success: #86efac;
      --blob1: #7c3aed;
      --blob2: #c084fc;
      --wm-color: rgba(192,132,252,0.055);
      --topbar-bg: rgba(26,15,46,0.92);
      --infobar-bg: rgba(35,21,66,0.8);
      --status-bg: rgba(26,15,46,0.92);
      --scroll-bg: rgba(35,21,66,0.88);
      --popout-bg: #1a0f2e;
    }

    /* ── LIGHT THEME ── */
    [data-theme="light"] {
      --bg: #f3e8ff;
      --surface: #ffffff;
      --surface2: #ede0ff;
      --border: #d8b4fe;
      --accent: #3b0764;
      --accent2: #a855f7;
      --accent3: #7c3aed;
      --text: #2e0a4f;
      --muted: #9d7ec4;
      --danger: #dc2626;
      --success: #16a34a;
      --blob1: rgba(168,85,247,0.12);
      --blob2: rgba(124,58,237,0.08);
      --wm-color: rgba(124,58,237,0.06);
      --topbar-bg: rgba(255,255,255,0.95);
      --infobar-bg: rgba(237,224,255,0.9);
      --status-bg: rgba(255,255,255,0.95);
      --scroll-bg: rgba(255,255,255,0.9);
      --popout-bg: #f3e8ff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.35s, color 0.35s;
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0; opacity: 0.18;
      transition: background 0.35s;
    }
    .blob1 { width: 400px; height: 400px; background: var(--blob1); top: -120px; left: -100px; }
    .blob2 { width: 300px; height: 300px; background: var(--blob2); bottom: -80px; right: -60px; }

    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .shell { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

    /* ══ TOPBAR ══ */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 56px;
      background: var(--topbar-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; position: relative; z-index: 100;
      transition: background 0.35s, border-color 0.35s;
    }
    .topbar::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent2), var(--accent3), transparent);
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .logo-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 18px rgba(168,85,247,0.5); }
      50% { box-shadow: 0 0 32px rgba(168,85,247,0.85); }
    }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 21px; letter-spacing: 0.08em; line-height: 1; }
    .logo-text span { color: var(--accent2); }
    .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; font-weight: 500; }

    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      width: 34px; height: 34px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px;
      transition: all 0.2s; color: var(--text);
    }
    .icon-btn:hover { background: var(--accent3); color: #fff; border-color: var(--accent3); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(168,85,247,0.4); }
    .icon-btn:active { transform: scale(0.95); }

    .badge-lock {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 20px;
      font-size: 10px; font-weight: 600;
      color: var(--accent2);
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    /* ══ INFOBAR ══ */
    .infobar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 20px;
      background: var(--infobar-bg);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 12px;
      transition: background 0.35s, border-color 0.35s;
    }
    .doc-info { display: flex; align-items: center; gap: 10px; }
    .doc-icon {
      width: 30px; height: 30px;
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .doc-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .doc-meta { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .social-links { display: flex; align-items: center; gap: 5px; }
    .social-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 9px; border-radius: 16px;
      font-size: 10px; font-weight: 600;
      text-decoration: none; transition: all 0.2s;
      border: 1px solid transparent;
    }
    .social-btn svg { width: 11px; height: 11px; }
    .social-yt { background: rgba(255,0,0,0.1); color: #ff5555; border-color: rgba(255,0,0,0.2); }
    .social-yt:hover { background: rgba(255,0,0,0.2); transform: translateY(-1px); }
    .social-ig { background: rgba(225,48,108,0.1); color: #e1306c; border-color: rgba(225,48,108,0.2); }
    .social-ig:hover { background: rgba(225,48,108,0.2); transform: translateY(-1px); }
    .social-tg { background: rgba(0,136,204,0.1); color: #29b6f6; border-color: rgba(0,136,204,0.2); }
    .social-tg:hover { background: rgba(0,136,204,0.2); transform: translateY(-1px); }

    /* ══ VIEWER ══ */
    .viewer-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
    iframe { width: 100%; height: 100%; border: none; display: block; transition: filter 0.3s; background: transparent; }

    /* ── Watermark ── */
    .watermark-layer {
      position: absolute; inset: 0; z-index: 20;
      pointer-events: none; overflow: hidden;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(6, 1fr);
    }
    .wm-cell { display: flex; align-items: center; justify-content: center; transform: rotate(-28deg); }
    .wm-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px; letter-spacing: 0.2em;
      color: var(--wm-color);
      white-space: nowrap;
      transition: color 0.35s;
    }

    /* Popout blocker */
    .popout-block {
      position: absolute; top: 0; right: 0;
      width: 52px; height: 52px; z-index: 30;
      background: var(--bg);
      border-bottom-left-radius: 8px;
      transition: background 0.35s;
    }

    /* Scroll buttons */
    .scroll-btns {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); z-index: 50;
      display: flex; flex-direction: column; gap: 8px;
    }
    .scroll-btn {
      width: 40px; height: 40px;
      background: var(--scroll-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .scroll-btn:hover { background: var(--accent3); color: #fff; border-color: var(--accent3); transform: scale(1.08); box-shadow: 0 4px 20px rgba(168,85,247,0.5); }
    .scroll-btn:active { transform: scale(0.95); }

    /* ══ LOADER ══ */
    .loader {
      position: absolute; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px; z-index: 60;
      transition: opacity 0.6s, visibility 0.6s, background 0.35s;
    }
    .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .thunder-anim { position: relative; width: 80px; height: 80px; }
    .thunder-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid transparent; animation: ring-spin 1.2s linear infinite; }
    .thunder-ring:nth-child(1) { border-top-color: var(--accent2); }
    .thunder-ring:nth-child(2) { inset: 8px; border-right-color: var(--accent3); animation-duration: 0.9s; animation-direction: reverse; }
    .thunder-ring:nth-child(3) { inset: 16px; border-bottom-color: var(--accent2); animation-duration: 1.5s; }
    @keyframes ring-spin { to { transform: rotate(360deg); } }
    .thunder-bolt { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; animation: bolt-pulse 1s ease-in-out infinite; }
    @keyframes bolt-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2);filter:drop-shadow(0 0 10px var(--accent2))} }

    .loader-brand { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.1em; color: var(--text); }
    .loader-brand span { color: var(--accent2); }
    .loader-bar { width: 180px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .loader-fill { height: 100%; background: linear-gradient(90deg, var(--accent3), var(--accent2)); border-radius: 2px; animation: load-progress 4s ease-in-out forwards; }
    @keyframes load-progress { 0%{width:0} 40%{width:50%} 80%{width:85%} 95%{width:95%} }
    .loader-status { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ══ STATUSBAR ══ */
    .statusbar {
      height: 28px;
      background: var(--status-bg); backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; flex-shrink: 0;
      transition: background 0.35s, border-color 0.35s;
    }
    .status-l, .status-r { display: flex; align-items: center; gap: 12px; font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); animation: live 2s infinite; }
    @keyframes live { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Toast */
    .toast {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--surface);
      border: 1px solid rgba(168,85,247,0.4);
      color: var(--accent2); padding: 9px 18px;
      border-radius: 8px; font-size: 12px; font-weight: 600;
      z-index: 9000; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      box-shadow: 0 4px 24px rgba(168,85,247,0.25);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Screenshot black flash */
    #ss-overlay { display:none; position:fixed; inset:0; z-index:99999; background:#000; pointer-events:none; }

    @media print { body { display: none !important; } }
  </style>
</head>
<body>

<div class="blob blob1"></div>

<div class="shell">

  <!-- VIEWER -->
  <div class="viewer-wrap">

<script>
  // ── Watermark (fixed) ──
  const wmText = '⚡ THUNDERSTUDY';
  function buildWatermarks() {
    const wm = document.getElementById('wm');
    wm.innerHTML = '';
    for (let i = 0; i < 24; i++)
      wm.innerHTML += `<div class="wm-cell"><span class="wm-text">${wmText}</span></div>`;
  }
  buildWatermarks();

  // ── Theme toggle ──
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isDark ? '🌞' : '🌙';
    showToast(isDark ? '☀️ Light mode on' : '🌙 Dark mode on');
  }

  // ── Fullscreen ──
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
      document.getElementById('fsBtn').textContent = '✕';
    } else {
      document.exitFullscreen();
      document.getElementById('fsBtn').textContent = '⛶';
    }
  }
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) document.getElementById('fsBtn').textContent = '⛶';
  });

  // ── Loader ──
  const msgs = ['Loading document…','Verifying access…','Applying security…','Almost ready…'];
  let mi = 0;
  const statusEl = document.getElementById('loaderStatus');
  const msgInt = setInterval(() => { mi=(mi+1)%msgs.length; statusEl.textContent=msgs[mi]; }, 1800);

  function handleLoad() {
    clearInterval(msgInt);
    statusEl.textContent = 'Document ready!';
    setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
  }

  setTimeout(() => {
    if (!document.getElementById('loader').classList.contains('hidden'))
      document.getElementById('pdfFrame').src = `https://docs.google.com/viewer?url=https://drive.google.com/uc%3Fexport%3Ddownload%26id%3D1gHJ9XOUToo6kUw-R42z9sDx7kuZvHJNL&embedded=true`;
  }, 9000);

  // ── Scroll ──
  let scrollInt = null;
  function startScroll(dir) {
    function go() {
      try { document.getElementById('pdfFrame').contentWindow.scrollBy(0, dir==='down'?120:-120); }
      catch(e) {
        const f = document.getElementById('pdfFrame'); f.focus();
        f.dispatchEvent(new KeyboardEvent('keydown',{key:dir==='down'?'ArrowDown':'ArrowUp',keyCode:dir==='down'?40:38,bubbles:true,cancelable:true}));
      }
    }
    go(); scrollInt = setInterval(go, 100);
  }
  function stopScroll() { clearInterval(scrollInt); scrollInt=null; }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Screenshot flash ──
  function flashBlack() {
    const o = document.getElementById('ss-overlay');
    o.style.display = 'block';
    setTimeout(() => o.style.display = 'none', 400);
    showToast('🚫 Screenshot blocked');
    try { navigator.clipboard.writeText(''); } catch(e) {}
  }

  // ── Block right-click ──
  document.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showToast('🚫 Right-click disabled'); }, true);
  window.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); }, true);

  // ── Block keyboard ──
  document.addEventListener('keydown', e => {
    // Allow Enter only inside watermark input
    if (e.target === document.getElementById('wmInput')) return;

    const isScreenshot =
      e.key === 'PrintScreen' ||
      (e.metaKey && e.shiftKey && ['3','4','5','s'].includes(e.key)) ||
      (e.ctrlKey && e.key === 'PrintScreen') ||
      (e.altKey && e.key === 'PrintScreen');

    if (isScreenshot) { e.preventDefault(); e.stopPropagation(); flashBlack(); return; }

    const blocked =
      (e.ctrlKey||e.metaKey) && ['s','p','u','a','c','j','i','k','l','n','r','t','w','e','g','h'].includes(e.key.toLowerCase()) ||
      ['F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'].includes(e.key) ||
      (e.altKey && e.key==='F4') ||
      (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()));

    if (blocked) { e.preventDefault(); e.stopPropagation(); showToast('🚫 Shortcut blocked — THunderstudy'); }
  }, true);

  document.addEventListener('keyup', e => {
    if (e.key === 'PrintScreen') flashBlack();
  }, true);

  // ── Block drag & select ──
  document.addEventListener('dragstart', e => e.preventDefault(), true);
  document.addEventListener('selectstart', e => e.preventDefault(), true);

  // ── Block print ──
  window.print = () => showToast('🚫 Printing disabled');
  window.addEventListener('beforeprint', e => { e.preventDefault(); showToast('🚫 Printing disabled'); });

  // ── Blur when tab hidden ──
  document.addEventListener('visibilitychange', () => {
    document.getElementById('pdfFrame').style.filter = document.hidden ? 'blur(20px)' : '';
  });

  // ── DevTools blur ──
  setInterval(() => {
    document.body.style.filter =
      (window.outerWidth-window.innerWidth>160 || window.outerHeight-window.innerHeight>160) ? 'blur(20px)' : '';
  }, 800);
</script>
<style>@media print{body{display:none!important}}</style>
</body>
</html>
